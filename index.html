<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Menu Vertical | Transição Lenta e Suave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            background-image: radial-gradient(circle at 30% 50%, rgba(0, 136, 255, 0.1) 0%, #000000 85%);
            font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Container do menu */
        .menu {
            position: relative;
            max-width: 100%;
            width: auto;
        }

        .menu ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
        }

        .menu ul li {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        /* ===== BARRA VERTICAL ESQUERDA (marcador estático) ===== */
        .menu ul li::before {
            content: '|';
            color: #0088ff;
            font-size: 3.5rem;
            font-weight: 800;
            margin-right: 0.9rem;
            /* TRANSIÇÃO MAIS LENTA: 0.8s */
            transition: all 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-block;
            text-shadow: 0 0 4px rgba(0, 136, 255, 0.4);
            font-family: 'Courier New', monospace;
            line-height: 1;
            flex-shrink: 0;
        }

        /* Link do menu - texto com contorno branco */
        .menu ul li a {
            text-decoration: none;
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000000;
            -webkit-text-stroke: 2px #ffffff;
            text-stroke: 2px #ffffff;
            /* TRANSIÇÃO MAIS LENTA: 0.8s */
            transition: all 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            z-index: 2;
            background-color: transparent;
            padding: 0.2rem 0;
            font-family: 'Courier New', monospace;
            line-height: 1.2;
            display: inline-block;
            white-space: nowrap;
        }

        /* ===== BARRA QUE VAI DESLIZAR E PARAR NO FINAL DA PALAVRA ===== */
        .menu ul li a {
            position: relative;
        }
       
        /* Pseudo-elemento que desliza - será posicionado em relação ao link */
        .menu ul li a::after {
            content: '|';
            color: #0088ff;
            font-size: 3.5rem;
            font-weight: 800;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            /* TRANSIÇÃO MAIS LENTA: 0.8s para opacidade e 0.9s para movimento */
            transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2),
                        left 0.9s cubic-bezier(0.2, 0.85, 0.4, 1.05),
                        transform 0.9s cubic-bezier(0.2, 0.85, 0.4, 1.05);
            pointer-events: none;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 6px #0088ff;
            line-height: 1;
            z-index: 1;
        }
       
        /* No hover: a barra desliza da esquerda para o final da palavra */
        .menu ul li:hover a::after {
            opacity: 1;
            left: 100%;
            transform: translateY(-50%) translateX(0.3rem);
        }
       
        /* Barra esquerda some no hover - transição lenta */
        .menu ul li:hover::before {
            opacity: 0;
            margin-right: 0;
            transform: scaleX(0.5);
        }
       
        /* Link fica azul sólido sem contorno - transição lenta */
        .menu ul li:hover a {
            color: #0088ff;
            -webkit-text-stroke: 0px;
            text-stroke: 0px;
            text-shadow: 0 0 5px rgba(0, 136, 255, 0.4);
        }
       
        /* Efeito de leve deslocamento no hover para dar dinamismo - mais lento */
        .menu ul li {
            transition: transform 0.6s ease;
        }
       
        .menu ul li:hover {
            transform: translateX(6px);
        }
       
        /* Animação de brilho mais suave e lenta */
        .menu ul li:hover a {
            animation: subtleGlow 1s ease-in-out;
        }
       
        @keyframes subtleGlow {
            0% {
                text-shadow: 0 0 0px rgba(0, 136, 255, 0);
            }
            50% {
                text-shadow: 0 0 12px rgba(0, 136, 255, 0.7);
            }
            100% {
                text-shadow: 0 0 5px rgba(0, 136, 255, 0.4);
            }
        }
       
        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 720px) {
            .menu ul li a {
                font-size: 2.2rem;
            }
            .menu ul li::before,
            .menu ul li a::after {
                font-size: 2.2rem;
            }
            .menu ul {
                gap: 1.5rem;
            }
            .menu ul li:hover a::after {
                transform: translateY(-50%) translateX(0.2rem);
            }
        }
       
        @media (max-width: 540px) {
            .menu ul li a {
                font-size: 1.8rem;
                -webkit-text-stroke: 1.2px white;
            }
            .menu ul li::before,
            .menu ul li a::after {
                font-size: 1.8rem;
            }
            .menu ul li:hover a::after {
                transform: translateY(-50%) translateX(0.15rem);
            }
            .menu ul li:hover {
                transform: translateX(4px);
            }
        }
       
        /* Acessibilidade: foco nos links */
        .menu ul li a:focus-visible {
            outline: 2px solid #0088ff;
            outline-offset: 8px;
            border-radius: 4px;
            color: #0088ff;
            -webkit-text-stroke: 0px;
            transition: all 0.8s ease;
        }
       
        .menu ul li a:focus-visible::after {
            opacity: 1;
            left: 100%;
            transform: translateY(-50%) translateX(0.3rem);
        }
       
        /* Suporte para navegadores com text-stroke nativo */
        @supports (text-stroke: 2px white) {
            .menu ul li a {
                text-stroke: 2px white;
                -webkit-text-stroke: 2px white;
            }
        }
       
        /* Para dispositivos touch: manter comportamento similar com :active */
        @media (hover: none) and (pointer: coarse) {
            .menu ul li:active::before {
                opacity: 0;
                margin-right: 0;
                transition: all 0.8s ease;
            }
            .menu ul li:active a::after {
                opacity: 1;
                left: 100%;
                transform: translateY(-50%) translateX(0.3rem);
                transition: opacity 0.8s ease, left 0.9s ease;
            }
            .menu ul li:active a {
                color: #0088ff;
                -webkit-text-stroke: 0px;
                transition: all 0.8s ease;
            }
            .menu ul li:active {
                transform: translateX(6px);
                transition: transform 0.6s ease;
            }
        }
       
        /* Ajustes de performance e suavidade */
        .menu ul li a::after {
            will-change: transform, opacity, left;
        }
       
        .menu ul li::before {
            will-change: transform, opacity, margin;
        }
       
        /* Estilo adicional para tornar a experiência mais premium */
        .menu ul li {
            padding: 0.1rem 0;
        }
       
        /* Pequena melhoria visual: a barra direita terá um leve brilho */
        .menu ul li:hover a::after {
            text-shadow: 0 0 8px #0088ff, 0 0 3px #00aaff;
        }
       
        /* Ajuste para Safari */
        @supports (-webkit-touch-callout: none) {
            .menu ul li a::after {
                top: 55%;
            }
        }
       
        /* ===== RESUMO DAS TRANSIÇÕES MAIS LENTAS =====
           - ::before (barra esquerda): 0.8s
           - a (texto do link): 0.8s
           - a::after (barra deslizante): opacidade 0.8s, left/transform 0.9s
           - li (deslocamento lateral): 0.6s
           - glow animation: 1s
           
           Tudo fica mais suave, relaxado e elegante!
        */
       
        /* Bônus: efeito de delay sutil entre os itens ao passar o mouse
           (opcional, mas muito elegante - descomente se quiser um efeito cascata)
        */
        /*
        .menu ul li:nth-child(1):hover { transition-delay: 0s; }
        .menu ul li:nth-child(2):hover { transition-delay: 0.05s; }
        .menu ul li:nth-child(3):hover { transition-delay: 0.1s; }
        .menu ul li:nth-child(4):hover { transition-delay: 0.15s; }
        .menu ul li:nth-child(5):hover { transition-delay: 0.2s; }
        */
       
        /* Versão mais limpa - removemos o delay para manter previsibilidade,
           mas as transições já estão significativamente mais lentas (0.8s e 0.9s) */
       
        /* Para uma experiência ainda mais lenta, podemos aumentar para 1.2s */
        /* Caso queira mais devagar ainda, descomente as linhas abaixo: */
        /*
        .menu ul li::before { transition-duration: 1.2s; }
        .menu ul li a { transition-duration: 1.2s; }
        .menu ul li a::after { transition-duration: 1.2s, 1.4s, 1.4s; }
        .menu ul li { transition-duration: 1s; }
        */
    </style>
</head>
<body>
    <nav class="menu" aria-label="Menu principal">
        <ul>
            <li>
                <a href="#">Home</a>
            </li>
            <li>
                <a href="#">About</a>
            </li>
            <li>
                <a href="#">Services</a>
            </li>
            <li>
                <a href="#">Team</a>
            </li>
            <li>
                <a href="#">Contact</a>
            </li>
        </ul>
    </nav>
</body>
</html>
